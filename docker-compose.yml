services:
  web:
    # build from local Dockerfile and expose port 3000
    build: .
    ports:
      - "3000:3000"

    # connect to Postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/workshop

    # wait for db to be healthy
    depends_on:
      db:
        condition: service_healthy

  db:
    # postgres image + healthcheck
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

    # volumes (data + init script)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # postgres env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop

# named volume
volumes:
  pgdata: